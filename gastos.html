<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle de Gastos</title>
  <meta name="description"
    content="Controle pessoal de entradas e saídas financeiras com motivo e forma de pagamento." />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="gastos.css" />
</head>

<body>

  <!-- Navegação -->
  <nav class="app-nav">
    <a href="index.html" class="nav-link" id="nav-tarefas">
      <span class="nav-icon">📋</span>
      <span>Tarefas</span>
    </a>
    <a href="gastos.html" class="nav-link active" id="nav-gastos">
      <span class="nav-icon">💰</span>
      <span>Gastos</span>
    </a>
  </nav>

  <!-- PIN Overlay -->
  <div class="pin-overlay" id="pin-overlay">
    <div class="pin-card">
      <div class="pin-lock">🔒</div>
      <h2 class="pin-title">Acesso Restrito</h2>
      <p class="pin-subtitle">Digite o PIN para continuar</p>
      <div class="pin-dots" id="pin-dots">
        <span class="pin-dot" id="dot-0"></span>
        <span class="pin-dot" id="dot-1"></span>
        <span class="pin-dot" id="dot-2"></span>
        <span class="pin-dot" id="dot-3"></span>
      </div>
      <div class="pin-grid">
        <button class="pin-num" data-n="1">1</button>
        <button class="pin-num" data-n="2">2</button>
        <button class="pin-num" data-n="3">3</button>
        <button class="pin-num" data-n="4">4</button>
        <button class="pin-num" data-n="5">5</button>
        <button class="pin-num" data-n="6">6</button>
        <button class="pin-num" data-n="7">7</button>
        <button class="pin-num" data-n="8">8</button>
        <button class="pin-num" data-n="9">9</button>
        <button class="pin-num pin-clear" id="pin-clear-btn">⌫</button>
        <button class="pin-num" data-n="0">0</button>
        <div></div>
      </div>
      <p class="pin-error" id="pin-error"></p>
    </div>
  </div>

  <div class="card">

    <!-- Cabeçalho -->
    <header>
      <p class="label">Finanças pessoais</p>
      <h1>Controle de<br>Gastos</h1>

      <!-- Resumo financeiro -->
      <div class="finance-summary">
        <div class="finance-stat income">
          <span class="finance-icon">↑</span>
          <div>
            <span class="finance-num" id="total-entrada">R$ 0,00</span>
            <span class="finance-lbl">Entradas</span>
          </div>
        </div>
        <div class="finance-divider"></div>
        <div class="finance-stat expense">
          <span class="finance-icon">↓</span>
          <div>
            <span class="finance-num" id="total-saida">R$ 0,00</span>
            <span class="finance-lbl">Saídas</span>
          </div>
        </div>
        <div class="finance-divider"></div>
        <div class="finance-stat balance" id="balance-stat">
          <span class="finance-icon">=</span>
          <div>
            <span class="finance-num" id="saldo-total">R$ 0,00</span>
            <span class="finance-lbl">Saldo</span>
          </div>
        </div>
      </div>
    </header>

    <!-- Formulário de adição -->
    <div class="form-area">

      <!-- Tipo: Entrada ou Saída -->
      <div class="tipo-toggle">
        <button class="tipo-btn active" id="btn-saida" data-tipo="saida">
          <span>↓</span> Saída
        </button>
        <button class="tipo-btn" id="btn-entrada" data-tipo="entrada">
          <span>↑</span> Entrada
        </button>
      </div>

      <!-- Valor -->
      <div class="field-group">
        <label class="field-label" for="valor-input">Valor (R$)</label>
        <input type="number" id="valor-input" placeholder="0,00" min="0" step="0.01" />
      </div>

      <!-- Motivo -->
      <div class="field-group">
        <label class="field-label" for="motivo-input">Motivo / Descrição</label>
        <input type="text" id="motivo-input" placeholder="Ex: Mercado, Salário, Aluguel…" maxlength="100" />
      </div>

      <!-- Forma de pagamento -->
      <div class="field-group">
        <label class="field-label">Forma de pagamento</label>
        <div class="pagamento-grid">
          <button class="pagto-btn active" data-pagto="dinheiro">💵 Dinheiro</button>
          <button class="pagto-btn" data-pagto="pix">⚡ Pix</button>
          <button class="pagto-btn" data-pagto="debito">💳 Débito</button>
          <button class="pagto-btn" data-pagto="credito">🔄 Crédito</button>
          <button class="pagto-btn" data-pagto="transferencia">🏦 Transf.</button>
          <button class="pagto-btn" data-pagto="outro">📎 Outro</button>
        </div>
      </div>

      <button class="btn-add-gasto" id="add-gasto-btn">Adicionar lançamento</button>
    </div>

    <!-- Filtros de visualização -->
    <div class="section-header static-header" style="margin-top: 8px;">
      <div class="section-title">
        <span class="section-icon">📊</span>
        <span>Lançamentos</span>
      </div>
      <span class="total-count" id="total-count">0 registros</span>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="todos">Todos</button>
      <button class="filter-btn" data-filter="entrada">Entradas</button>
      <button class="filter-btn" data-filter="saida">Saídas</button>
    </div>

    <!-- Lista de lançamentos -->
    <ul id="gastos-list"></ul>

    <!-- Estado vazio -->
    <div class="empty" id="empty-state">
      <div class="empty-icon">💸</div>
      <p>Nenhum lançamento ainda.<br>Adicione sua primeira movimentação!</p>
    </div>

    <!-- Rodapé -->
    <div class="footer">
      <span id="footer-info">Salvo na nuvem</span>
      <button class="btn-clear" id="clear-all-btn">Limpar todos</button>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="gastos.js"></script>
</body>

</html>
